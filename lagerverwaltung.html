<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lagerverwaltung</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>

<body>
  <button class="btn" id="logout-btn">Abmelden</button>
  <div class="topbar">
    <div>
      <div class="app-title">Lagerverwaltung</div>
      <div class="app-sub" id="sub">Klicke auf ein Fach zum Bearbeiten</div>
    </div>
    <div class="actions">
      <button class="btn" id="layout-btn">⊞ Raster ändern</button>
      <button class="btn primary" id="add-btn">+ Fach hinzufügen</button>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="legend">
    <div class="leg">
      <div class="dot" style="background:var(--c-leer)"></div>Leer
    </div>
    <div class="leg">
      <div class="dot" style="background:var(--c-voll)"></div>Voll
    </div>
    <div class="leg">
      <div class="dot" style="background:var(--c-gereinigt)"></div>Gereinigt
    </div>
    <div class="leg">
      <div class="dot" style="background:var(--c-reserviert)"></div>Reserviert
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <!-- Modal -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div id="partition-picker" class="partition-picker" style="display:none"></div>
      <div id="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">Fach bearbeiten</h3>
        <button class="btn" id="add-partition-btn" type="button">+ Teilung</button>
      </div>
      <div id="partition-tabs" class="partition-tabs" style="display:none"></div>
      <div class="field">
        <label>Fruchtart</label>
        <input id="f-frucht" type="text" placeholder="z.B. Weizen" />
      </div>
      <div class="field">
        <label>Partie-Nummer</label>
        <div class="partie-row">
          <div class="custom-select partie-dropdown" id="partie-dropdown">
            <button class="cs-trigger" id="partie-trigger" type="button">
              <span class="cs-label" id="pn-label">Keine vorhanden</span>
              <span class="cs-arrow">▾</span>
            </button>
            <ul class="cs-list" id="pn-list"></ul>
          </div>
          <button class="btn" type="button" id="partie-add-btn">+ Hinzufügen</button>
        </div>
        <div class="pn-new-row" id="pn-new-row">
          <input id="pn-new-input" type="text" placeholder="z.B. 66-1678" />
          <button class="btn primary" type="button" id="pn-ok-btn">OK</button>
        </div>
      </div>
      <div class="field">
        <label>Status</label>
        <div class="custom-select" id="status-dropdown">
          <button class="cs-trigger" id="status-trigger" type="button">
            <span class="cs-label" id="cs-label">Leer</span>
            <span class="cs-arrow">▾</span>
          </button>
          <ul class="cs-list" id="cs-list">
            <li class="cs-item" data-value="leer"><span class="badge leer">Leer</span></li>
            <li class="cs-item" data-value="voll"><span class="badge voll">Voll mit Ware</span></li>
            <li class="cs-item" data-value="gereinigt"><span class="badge gereinigt">Gereinigt</span></li>
            <li class="cs-item" data-value="reserviert"><span class="badge reserviert">Reserviert</span></li>
          </ul>
        </div>
        <input type="hidden" id="f-status" />
      </div>
      <div class="field">
        <label>Temperaturen in °C</label>
        <div class="temp-list" id="temp-list"></div>
        <button class="btn temp-add-btn" type="button" id="temp-add-btn">+ Temperatureintrag hinzufügen</button>
      </div>
      <div class="field">
        <label>Zuletzt geändert</label>
        <input id="f-date" type="text" readonly />
      </div>
      <div class="modal-actions">
        <button class="btn danger" id="del-btn">Löschen</button>
        <div class="modal-actions-right">
          <button class="btn" id="modal-cancel-btn">Abbrechen</button>
          <button class="btn primary" id="modal-save-btn">Speichern</button>
        </div>
      </div>
      </div><!-- end modal-content -->
    </div>
  </div>

  <!-- Temperatur-Formular Overlay -->
  <div class="overlay" id="temp-overlay">
    <div class="modal">
      <h3>Temperatureintrag</h3>
      <div class="field temp-range-row">
        <div>
          <label>Temperatur von (°C)</label>
          <input id="t-von" type="number" step="0.1" placeholder="z.B. 2" />
        </div>
        <div>
          <label>bis (°C)</label>
          <input id="t-bis" type="number" step="0.1" placeholder="z.B. 8" />
        </div>
      </div>
      <div class="field">
        <label>Sichtkontrolle</label>
        <input id="t-sicht" type="text" placeholder="z.B. Schädlinge" />
      </div>
      <div class="field">
        <label>Durchgeführte Maßnahmen</label>
        <input id="t-massnahmen" type="text" placeholder="z.B. Kühlung aktiviert" />
      </div>
      <div class="modal-actions">
        <button class="btn" type="button" id="temp-cancel-btn">Abbrechen</button>
        <button class="btn primary" type="button" id="temp-save-btn">Speichern</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="./scripts/ui.js"></script>
</body>

</html>
